# Monorepo production deployment: AWS Lambda (backend) + Firebase Hosting (frontend)
# Triggers on push to main or manual dispatch. Does not deploy if checks/build fail.

name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Validation (must pass before any deployment)
  # ---------------------------------------------------------------------------

  backend-check:
    name: Backend — validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

  frontend-check:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: portfolio-frontend/build
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Deployment (only after BOTH check jobs succeed)
  # ---------------------------------------------------------------------------

  deploy-backend:
    name: Backend — deploy Lambda
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check
    defaults:
      run:
        working-directory: portfolio-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Create deployment package
        run: |
          zip -r function.zip . \
            -x ".git/*" ".github/*"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file "fileb://function.zip"

  deploy-frontend:
    name: Frontend — deploy Firebase Hosting
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: portfolio-frontend/build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        working-directory: portfolio-frontend
        run: npx firebase-tools@13.35.1 deploy --only hosting --non-interactive --project "${{ vars.FIREBASE_PROJECT_ID }}"

  # ---------------------------------------------------------------------------
  # Email notification (success or failure)
  # ---------------------------------------------------------------------------

  notify:
    name: Notify — deployment result
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check
      - deploy-backend
      - deploy-frontend
    if: always()

    steps:
      - name: Skip email notification (SMTP not configured)
        if: >-
          ${{ secrets.SMTP_SERVER == ''
          || secrets.SMTP_PORT == ''
          || secrets.SMTP_USERNAME == ''
          || secrets.SMTP_PASSWORD == ''
          || secrets.SMTP_FROM == ''
          || secrets.DEPLOY_NOTIFY_EMAIL == '' }}
        run: echo "SMTP secrets not configured; skipping email notification."

      - name: Send success email
        if: >-
          ${{ secrets.SMTP_SERVER != ''
          && secrets.SMTP_PORT != ''
          && secrets.SMTP_USERNAME != ''
          && secrets.SMTP_PASSWORD != ''
          && secrets.SMTP_FROM != ''
          && secrets.DEPLOY_NOTIFY_EMAIL != ''
          && needs.backend-check.result == 'success'
          && needs.frontend-check.result == 'success'
          && needs.deploy-backend.result == 'success'
          && needs.deploy-frontend.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Portfolio] Production deployment succeeded"
          to: ${{ secrets.DEPLOY_NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            Production deployment completed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Job results:
            - Backend validate: ${{ needs.backend-check.result }}
            - Frontend test & build: ${{ needs.frontend-check.result }}
            - Backend deploy (Lambda): ${{ needs.deploy-backend.result }}
            - Frontend deploy (Firebase): ${{ needs.deploy-frontend.result }}

      - name: Send failure email
        if: >-
          ${{ secrets.SMTP_SERVER != ''
          && secrets.SMTP_PORT != ''
          && secrets.SMTP_USERNAME != ''
          && secrets.SMTP_PASSWORD != ''
          && secrets.SMTP_FROM != ''
          && secrets.DEPLOY_NOTIFY_EMAIL != ''
          && !(needs.backend-check.result == 'success'
          && needs.frontend-check.result == 'success'
          && needs.deploy-backend.result == 'success'
          && needs.deploy-frontend.result == 'success') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Portfolio] Production deployment FAILED"
          to: ${{ secrets.DEPLOY_NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            Production deployment did not complete successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Job results:
            - Backend validate: ${{ needs.backend-check.result }}
            - Frontend test & build: ${{ needs.frontend-check.result }}
            - Backend deploy (Lambda): ${{ needs.deploy-backend.result }}
            - Frontend deploy (Firebase): ${{ needs.deploy-frontend.result }}

            Review the workflow logs for details.
